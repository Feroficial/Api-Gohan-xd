<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <link rel="icon" href="/src/icon.png" type="image/png">
    <title id="pageTitle">API ALYA · Plataforma Profesional</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-start: #f8fafc;
            --bg-end: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --card-bg: rgba(255,255,255,0.85);
            --sidebar-bg: rgba(255,255,255,0.98);
            --topbar-bg: rgba(255,255,255,0.95);
            --input-bg: #ffffff;
            --modal-bg: #ffffff;
            --btn-start: #1e293b;
            --btn-end: #0f172a;
            --accent: #e11d48;
            --accent-hover: #be123c;
            --player-bg: rgba(15,23,42,0.95);
            --shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
        }
        body.dark {
            --bg-start: #0f172a;
            --bg-end: #020617;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --card-bg: rgba(30,41,59,0.85);
            --sidebar-bg: rgba(15,23,42,0.98);
            --topbar-bg: rgba(15,23,42,0.95);
            --input-bg: #1e293b;
            --modal-bg: #1e293b;
            --btn-start: #475569;
            --btn-end: #334155;
            --player-bg: rgba(0,0,0,0.92);
            --shadow: 0 20px 35px -10px rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: var(--text-primary); background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%); overflow-x: hidden; transition: background 0.3s ease, color 0.3s ease; }
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-start); z-index: 10000; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: opacity 0.5s ease; }
        .spinner-border { border-top-color: var(--accent); }
        .music-player { position: fixed; bottom: 24px; right: 24px; width: 340px; background: var(--player-bg); backdrop-filter: blur(16px); border-radius: 24px; padding: 16px; z-index: 10000; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .music-player.minimized { width: 56px; padding: 12px; border-radius: 28px; }
        .music-player.minimized .music-info, .music-player.minimized .music-controls, .music-player.minimized .progress-container { display: none; }
        .music-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; color: white; }
        .music-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
        .music-toggle-min { background: rgba(255,255,255,0.08); border: none; border-radius: 50%; width: 28px; height: 28px; color: white; cursor: pointer; transition: 0.2s; }
        .music-toggle-min:hover { background: var(--accent); }
        .song-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: white; }
        .artist-name { font-size: 11px; opacity: 0.7; color: white; }
        .progress-container { background: rgba(255,255,255,0.15); border-radius: 20px; height: 4px; margin: 12px 0; cursor: pointer; }
        .progress-bar { background: var(--accent); border-radius: 20px; height: 100%; width: 0%; transition: width 0.1s linear; }
        .time-info { display: flex; justify-content: space-between; color: rgba(255,255,255,0.5); font-size: 10px; margin-bottom: 12px; }
        .music-controls { display: flex; justify-content: center; gap: 20px; }
        .control-btn { background: rgba(255,255,255,0.08); border: none; border-radius: 50%; width: 36px; height: 36px; color: white; cursor: pointer; transition: 0.2s; }
        .control-btn.play-btn { background: var(--accent); width: 48px; height: 48px; }
        .control-btn:hover { transform: scale(1.08); background: rgba(255,255,255,0.15); }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 64px; background: var(--topbar-bg); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; z-index: 1000; }
        .menu-toggle { width: 44px; height: 44px; background: rgba(0,0,0,0.05); border: none; border-radius: 14px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; }
        body.dark .menu-toggle { background: rgba(255,255,255,0.08); }
        .menu-toggle span { display: block; width: 20px; height: 2px; background: var(--text-primary); transition: 0.3s; border-radius: 2px; }
        .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
        .api-name { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .top-bar-right { display: flex; align-items: center; gap: 16px; }
        .theme-toggle, .logout-top-btn { background: none; border: 1px solid var(--border); border-radius: 40px; padding: 8px 18px; cursor: pointer; color: var(--text-primary); transition: 0.2s; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; }
        .theme-toggle:hover, .logout-top-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .sidebar { position: fixed; top: 64px; left: -300px; width: 300px; height: calc(100vh - 64px); background: var(--sidebar-bg); backdrop-filter: blur(16px); border-right: 1px solid var(--border); transition: left 0.3s ease; z-index: 999; padding: 24px 0; overflow-y: auto; }
        .sidebar.open { left: 0; }
        .sidebar-overlay { position: fixed; top: 64px; left: 0; width: 100%; height: calc(100vh - 64px); background: rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 998; }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        .sidebar-item { padding: 12px 28px; display: flex; align-items: center; gap: 12px; color: var(--text-secondary); cursor: pointer; transition: 0.2s; font-weight: 500; border-left: 3px solid transparent; }
        .sidebar-item:hover, .sidebar-item.active { background: var(--accent); color: white; border-left-color: white; }
        .sidebar-category { padding: 20px 28px 8px; font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .main-content { margin-top: 80px; padding: 40px 32px; max-width: 1400px; margin-left: auto; margin-right: auto; min-height: calc(100vh - 120px); }
        .home-banner { text-align: center; padding: 40px 20px; animation: fadeInUp 0.6s ease; }
        .home-banner img { max-width: 180px; border-radius: 50%; margin-bottom: 32px; box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2); border: 3px solid var(--accent); object-fit: cover; width: 180px; height: 180px; }
        .home-title { font-size: 56px; font-weight: 800; margin-bottom: 12px; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -1px; }
        .home-version { display: inline-block; background: var(--accent); color: white; padding: 6px 20px; border-radius: 60px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }
        .home-description { font-size: 18px; color: var(--text-secondary); max-width: 600px; margin: 0 auto; }
        .status-grid, .endpoints-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-top: 32px; }
        .status-card, .api-card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 24px; padding: 24px; transition: all 0.3s; }
        .status-card:hover, .api-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: var(--shadow); }
        .endpoint-btn { background: linear-gradient(135deg, var(--btn-start), var(--btn-end)); border: none; padding: 10px 28px; border-radius: 40px; color: white; font-weight: 600; transition: 0.2s; cursor: pointer; }
        .endpoint-btn:hover { background: var(--accent); transform: scale(1.02); }
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 1050; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--modal-bg); border-radius: 32px; border: 1px solid var(--border); width: 100%; max-width: 460px; padding: 40px; box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5); animation: fadeInUp 0.5s ease; text-align: center; }
        .auth-card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 3px solid var(--accent); }
        .auth-card h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .input-custom { margin-bottom: 20px; text-align: left; }
        .input-custom input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 16px; padding: 12px 16px; color: var(--text-primary); transition: 0.2s; }
        .input-custom input:focus { outline: none; border-color: var(--accent); }
        .auth-btn { background: var(--accent); width: 100%; padding: 12px; border: none; border-radius: 40px; font-weight: 700; color: white; transition: 0.2s; }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -6px var(--accent); }
        .switch-auth a { color: var(--accent); cursor: pointer; font-weight: 600; }
        .modal-content { background: var(--modal-bg); border: 1px solid var(--border); border-radius: 24px; }
        .modal-header { border-bottom-color: var(--border); }
        .modal-title { color: var(--text-primary); }
        .api-endpoint-box { background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-family: monospace; font-size: 13px; color: var(--accent); word-break: break-all; }
        .param-input { background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text-primary); width: 100%; margin-bottom: 12px; }
        .response-box { background: #1e293b; padding: 16px; border-radius: 12px; color: #e2e8f0; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 400px; overflow-y: auto; margin-top: 20px; }
        .footer { text-align: center; padding: 30px 20px; color: var(--text-secondary); border-top: 1px solid var(--border); margin-top: 40px; font-size: 13px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .home-title { font-size: 32px; } .main-content { padding: 20px 16px; } .home-banner img { width: 120px; height: 120px; } .music-player { width: 280px; } }
    </style>
</head>
<body>

<div id="loadingScreen"><div class="spinner-border"></div><p class="mt-3">Cargando plataforma...</p></div>

<div class="music-player" id="musicPlayer">
    <div class="music-header"><span class="music-title">🎵 LYONN RADIO</span><button class="music-toggle-min" id="toggleMinimize">−</button></div>
    <div class="music-info"><div class="song-name" id="songName">Cargando...</div><div class="artist-name" id="artistName">---</div></div>
    <div class="progress-container" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>
    <div class="time-info"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
    <div class="music-controls"><button class="control-btn" id="prevBtn"><i class="fas fa-backward"></i></button><button class="control-btn play-btn" id="playPauseBtn"><i class="fas fa-play"></i></button><button class="control-btn" id="nextBtn"><i class="fas fa-forward"></i></button></div>
</div>
<audio id="audioPlayer"></audio>

<div class="top-bar">
    <div class="top-bar-left"><button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button><div class="api-name" id="apiName">API ALYA</div></div>
    <div class="top-bar-right"><button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i> Tema</button><button class="logout-top-btn" id="logoutBtn" style="display:none;"><i class="fas fa-sign-out-alt"></i> Salir</button></div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-nav">
        <div class="sidebar-item active" data-page="home"><i class="fas fa-home"></i> Inicio</div>
        <div class="sidebar-item" data-page="status"><i class="fas fa-chart-line"></i> Estado</div>
        <div class="sidebar-category"><i class="fas fa-tag"></i> Categorías</div>
        <div id="categoriesNav"></div>
        <div class="sidebar-item" data-page="all"><i class="fas fa-cubes"></i> Todos</div>
    </div>
</div>

<div class="main-content" id="mainContent"></div>

<div class="footer"><p id="footerText">Created by Lyonn <i class="fas fa-crown"></i></p></div>

<div class="modal fade" id="apiModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="modalTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div class="api-endpoint-box" id="endpointBox" style="display:none;"></div>
                <div id="paramsContainer"></div>
                <div id="loadingContainer" style="display:none; text-align:center;"><div class="spinner-border"></div></div>
                <div id="responseContainer"></div>
            </div>
            <div class="modal-footer"><button class="submit-btn" id="submitBtn" style="display:none;">Ejecutar</button></div>
        </div>
    </div>
</div>

<div id="authOverlay" class="auth-overlay">
    <div class="auth-card" id="loginCard">
        <img src="https://files.catbox.moe/osy7r9.jpg" alt="Alya">
        <h2>Bienvenido a ALYA</h2>
        <div class="mb-3">Accede a tu cuenta</div>
        <div class="input-custom"><label>CORREO</label><input type="email" id="loginEmail" placeholder="usuario@ejemplo.com"></div>
        <div class="input-custom"><label>CONTRASEÑA</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
        <button class="auth-btn" id="doLoginBtn">Iniciar Sesión</button>
        <div class="switch-auth mt-3">¿Sin cuenta? <a id="showRegisterBtn">Regístrate</a></div>
    </div>
    <div class="auth-card" id="registerCard" style="display:none">
        <img src="https://files.catbox.moe/osy7r9.jpg" alt="Alya">
        <h2>Crear Cuenta</h2>
        <div class="mb-3">Regístrate gratis</div>
        <div class="input-custom"><label>CORREO</label><input type="email" id="regEmail"></div>
        <div class="input-custom"><label>CONTRASEÑA</label><input type="password" id="regPassword"></div>
        <div class="input-custom"><label>CONFIRMAR</label><input type="password" id="regConfirm"></div>
        <button class="auth-btn" id="doRegisterBtn">Registrarse</button>
        <div class="switch-auth mt-3">¿Ya tienes cuenta? <a id="showLoginBtn">Inicia Sesión</a></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const playlist = [
        { name: "Acento Quinto Real", artist: "Lyonn", url: "https://files.catbox.moe/65kqmi.mp3" },
        { name: "Una vaina loca", artist: "Lyonn Special", url: "https://files.catbox.moe/g2zd2z.mp3" },
        { name: "Latin Lover", artist: "Neutro Shorty", url: "https://raw.githubusercontent.com/JTxs00/uploads/main/1775936364197.mpeg" },
        { name: "Odisea", artist: "Ozuna", url: "https://raw.githubusercontent.com/JTxs00/uploads/main/1775935979163.mpeg" }
    ];
    let currentIndex = 0, isPlaying = false;
    const audio = document.getElementById('audioPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const songNameEl = document.getElementById('songName');
    const artistNameEl = document.getElementById('artistName');
    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('progressContainer');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const toggleMinimize = document.getElementById('toggleMinimize');
    const musicPlayer = document.getElementById('musicPlayer');

    function loadSong(index) {
        const song = playlist[index];
        songNameEl.textContent = song.name;
        artistNameEl.textContent = song.artist;
        audio.src = song.url;
        audio.load();
        if (isPlaying) audio.play().catch(e => console.log(e));
        updatePlayIcon();
    }
    function updatePlayIcon() { playPauseBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>'; }
    function playPause() { isPlaying ? audio.pause() : audio.play(); isPlaying = !isPlaying; updatePlayIcon(); }
    function nextSong() { currentIndex = (currentIndex + 1) % playlist.length; loadSong(currentIndex); if (!isPlaying) { isPlaying = true; audio.play(); } }
    function prevSong() { currentIndex = (currentIndex - 1 + playlist.length) % playlist.length; loadSong(currentIndex); if (!isPlaying) { isPlaying = true; audio.play(); } }
    function updateProgress() { if (audio.duration) { progressBar.style.width = `${(audio.currentTime / audio.duration) * 100}%`; currentTimeEl.textContent = formatTime(audio.currentTime); durationEl.textContent = formatTime(audio.duration); } }
    function formatTime(sec) { const mins = Math.floor(sec / 60); const s = Math.floor(sec % 60); return `${mins}:${s.toString().padStart(2, '0')}`; }
    function setProgress(e) { const rect = progressContainer.getBoundingClientRect(); const percent = (e.clientX - rect.left) / rect.width; audio.currentTime = percent * audio.duration; }
    playPauseBtn.addEventListener('click', playPause);
    nextBtn.addEventListener('click', nextSong);
    prevBtn.addEventListener('click', prevSong);
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('ended', nextSong);
    progressContainer.addEventListener('click', setProgress);
    toggleMinimize.addEventListener('click', () => { musicPlayer.classList.toggle('minimized'); toggleMinimize.textContent = musicPlayer.classList.contains('minimized') ? '+' : '−'; });
    loadSong(0);

    const themeBtn = document.getElementById('themeToggleBtn');
    themeBtn.addEventListener('click', () => { document.body.classList.toggle('dark'); themeBtn.innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i> Claro' : '<i class="fas fa-moon"></i> Tema'; localStorage.setItem('alya_theme', document.body.classList.contains('dark') ? 'dark' : 'light'); });
    if (localStorage.getItem('alya_theme') === 'dark') document.body.classList.add('dark');

    const authOverlay = document.getElementById('authOverlay');
    const logoutBtn = document.getElementById('logoutBtn');
    let users = JSON.parse(localStorage.getItem('alya_users')) || [];
    function saveUsers() { localStorage.setItem('alya_users', JSON.stringify(users)); }
    document.getElementById('showRegisterBtn').onclick = () => { document.getElementById('loginCard').style.display = 'none'; document.getElementById('registerCard').style.display = 'block'; };
    document.getElementById('showLoginBtn').onclick = () => { document.getElementById('registerCard').style.display = 'none'; document.getElementById('loginCard').style.display = 'block'; };
    document.getElementById('doLoginBtn').onclick = () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();
        const user = users.find(u => u.email === email && u.password === pass);
        if (user) {
            localStorage.setItem('alya_logged', JSON.stringify({ email }));
            authOverlay.style.display = 'none';
            logoutBtn.style.display = 'flex';
            cargarInterfazCompleta();
        } else alert('Credenciales incorrectas');
    };
    document.getElementById('doRegisterBtn').onclick = () => {
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        if (!email || !pass) return alert('Completa campos');
        if (pass !== confirm) return alert('Contraseñas no coinciden');
        if (users.find(u => u.email === email)) return alert('Usuario ya existe');
        users.push({ email, password: pass });
        saveUsers();
        alert('Registro exitoso. Inicia sesión');
        document.getElementById('registerCard').style.display = 'none';
        document.getElementById('loginCard').style.display = 'block';
    };
    logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('alya_logged');
        authOverlay.style.display = 'flex';
        logoutBtn.style.display = 'none';
        document.getElementById('loginCard').style.display = 'block';
        document.getElementById('registerCard').style.display = 'none';
    });
    if (localStorage.getItem('alya_logged')) { authOverlay.style.display = 'none'; logoutBtn.style.display = 'flex'; cargarInterfazCompleta(); }

    let settings = { categories: [] };
    async function cargarInterfazCompleta() {
        try {
            const res = await fetch('/src/settings.json');
            settings = await res.json();
            document.getElementById('apiName').textContent = settings.name || 'API ALYA';
            document.getElementById('footerText').innerHTML = `Created by ${settings.apiSettings?.creator || 'Lyonn'} <i class="fas fa-crown"></i>`;
            const categoriesNav = document.getElementById('categoriesNav');
            if (settings.categories) settings.categories.forEach(cat => { let div = document.createElement('div'); div.className = 'sidebar-item'; div.dataset.page = 'category'; div.dataset.category = cat.name; div.innerHTML = `<i class="fas fa-folder"></i> ${cat.name}`; categoriesNav.appendChild(div); });
            renderHome();
            attachSidebarEvents();
        } catch(e) { console.error('Error cargando settings:', e); renderHomeFallback(); }
    }
    function renderHomeFallback() {
        document.getElementById('mainContent').innerHTML = `<div class="home-banner"><img src="https://files.catbox.moe/osy7r9.jpg" alt="Alya"><h1 class="home-title">API ALYA</h1><div class="home-version">v1.0</div><p class="home-description">Plataforma profesional de APIs</p><div class="endpoints-grid" id="homeEndpointsGrid"></div></div>`;
        document.getElementById('homeEndpointsGrid').innerHTML = `<div class="api-card"><div class="card-header"><strong>YouTube Search</strong></div><div class="card-desc">Busca videos en YouTube</div><button class="endpoint-btn" data-path="/search/youtube" data-params='[{"name":"q","required":true}]'>Probar</button></div>`;
        attachModalButtons();
    }
    function renderHome() {
        const container = document.getElementById('mainContent');
        container.innerHTML = `<div class="home-banner"><img src="https://files.catbox.moe/osy7r9.jpg" alt="Alya"><h1 class="home-title">${settings.name || 'API ALYA'}</h1><div class="home-version">${settings.version || 'v1.0'}</div><p class="home-description">${settings.description || 'Documentación interactiva de APIs'}</p><div class="endpoints-grid" id="homeEndpointsGrid"></div></div>`;
        const firstItems = settings.categories?.[0]?.items?.slice(0, 3) || [];
        document.getElementById('homeEndpointsGrid').innerHTML = firstItems.map(item => `<div class="api-card"><div class="card-header"><strong>${item.name}</strong></div><div class="card-desc">${item.desc}</div><button class="endpoint-btn" data-path="${item.path}" data-params='${JSON.stringify(item.params || [])}'>Probar</button></div>`).join('');
        attachModalButtons();
    }
    function attachModalButtons() {
        document.querySelectorAll('.endpoint-btn').forEach(btn => btn.addEventListener('click', () => { abrirModal(btn.dataset.path, JSON.parse(btn.dataset.params)); }));
    }
    let modalInstance = null;
    function abrirModal(path, paramsList) {
        const modalEl = document.getElementById('apiModal');
        modalInstance = new bootstrap.Modal(modalEl);
        document.getElementById('modalTitle').innerText = path;
        document.getElementById('paramsContainer').innerHTML = paramsList.map(p => `<input type="text" class="param-input" placeholder="${p.name}${p.required ? ' *' : ''}" id="param_${p.name}">`).join('');
        document.getElementById('submitBtn').style.display = 'block';
        document.getElementById('submitBtn').onclick = async () => {
            let query = new URLSearchParams();
            for (let p of paramsList) { let val = document.getElementById(`param_${p.name}`)?.value; if (val) query.append(p.name, val); }
            const url = `${window.location.origin}${path}?${query.toString()}`;
            const responseDiv = document.getElementById('responseContainer');
            responseDiv.innerHTML = '<div class="spinner-border"></div>';
            try { const res = await fetch(url); const data = await res.json(); responseDiv.innerHTML = `<pre class="response-box">${JSON.stringify(data, null, 2)}</pre>`; } catch(e) { responseDiv.innerHTML = `<pre class="response-box">Error: ${e.message}</pre>`; }
        };
        modalInstance.show();
    }
    function attachSidebarEvents() {
        document.querySelectorAll('.sidebar-item').forEach(el => el.addEventListener('click', (e) => { mostrarSeccion(e.currentTarget.dataset.page, e.currentTarget.dataset.category); }));
    }
    function mostrarSeccion(page, category) {
        const content = document.getElementById('mainContent');
        if (page === 'home') renderHome();
        else if (page === 'status') content.innerHTML = `<h2>Estado del API</h2><div class="status-grid"><div class="status-card"><div class="status-card-title">Estado</div><div class="status-card-value" style="color:#10b981;">● Online</div></div><div class="status-card"><div class="status-card-title">Versión</div><div class="status-card-value">${settings.version || '1.0'}</div></div></div>`;
        else if (page === 'category') { const cat = settings.categories?.find(c => c.name === category); if (cat) content.innerHTML = `<h2>${cat.name}</h2><div class="endpoints-grid">${cat.items.map(item => `<div class="api-card"><strong>${item.name}</strong><p>${item.desc}</p><button class="endpoint-btn" data-path="${item.path}" data-params='${JSON.stringify(item.params || [])}'>Probar</button></div>`).join('')}</div>`; attachModalButtons(); }
        else if (page === 'all') { let allItems = []; settings.categories?.forEach(cat => allItems.push(...cat.items)); content.innerHTML = `<h2>Todos los Endpoints</h2><div class="endpoints-grid">${allItems.map(item => `<div class="api-card"><strong>${item.name}</strong><p>${item.desc}</p><button class="endpoint-btn" data-path="${item.path}" data-params='${JSON.stringify(item.params || [])}'>Probar</button></div>`).join('')}</div>`; attachModalButtons(); }
    }
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    menuToggle.addEventListener('click', () => { menuToggle.classList.toggle('active'); sidebar.classList.toggle('open'); overlay.classList.toggle('active'); });
    overlay.addEventListener('click', () => { menuToggle.classList.remove('active'); sidebar.classList.remove('open'); overlay.classList.remove('active'); });
    window.addEventListener('load', () => setTimeout(() => document.getElementById('loadingScreen')?.remove(), 600));
</script>
</body>
</html>
