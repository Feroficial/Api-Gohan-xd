<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍚</text></svg>">
    <title>ALYA · API Profesional</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background 0.3s ease, color 0.2s ease;
            overflow-x: hidden;
        }

        /* ========== TEMA BLANCO ========== */
        body.white-theme {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            color: #0f172a;
        }

        /* ========== TEMA NEGRO ========== */
        body.black-theme {
            background: linear-gradient(135deg, #0a0f1a 0%, #0f172a 100%);
            color: #e2e8f0;
        }

        body.black-theme .top-bar,
        body.black-theme .sidebar,
        body.black-theme .status-card,
        body.black-theme .endpoint-card,
        body.black-theme .auth-card,
        body.black-theme .modal-content,
        body.black-theme .stat-card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-color: #334155;
            color: #f1f5f9;
        }

        body.black-theme .search-input {
            background: #1e293b;
            border-color: #475569;
            color: white;
        }

        body.black-theme .response-box {
            background: #0f172a;
            border: 1px solid #334155;
        }

        body.black-theme .sidebar-item:hover {
            background: #1e293b;
        }

        body.black-theme .sidebar-item.active {
            background: #1e293b;
            border-left-color: #f43f5e;
            color: #f43f5e;
        }

        /* Loading Screen */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }

        body.black-theme #loadingScreen {
            background: linear-gradient(135deg, #0a0f1a 0%, #0f172a 100%);
        }

        #loadingScreen.fade-out {
            opacity: 0;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            border: 3px solid #e2e8f0;
            border-top-color: #e11d48;
        }

        /* ========== REPRODUCTOR FLOTANTE ========== */
        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 15px;
            z-index: 10000;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }

        .music-player.minimized {
            width: 55px;
            padding: 10px;
            border-radius: 30px;
        }

        .music-player.minimized .music-info,
        .music-player.minimized .music-controls,
        .music-player.minimized .progress-container {
            display: none;
        }

        .music-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: white;
        }

        .music-title {
            font-size: 12px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            opacity: 0.8;
        }

        .music-toggle-min {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 0 5px;
            opacity: 0.7;
        }

        .music-info {
            text-align: center;
            margin-bottom: 10px;
        }

        .song-name {
            color: white;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .artist-name {
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            height: 4px;
            margin: 8px 0;
            cursor: pointer;
        }

        .progress-bar {
            background: #e11d48;
            border-radius: 10px;
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
            margin-bottom: 10px;
        }

        .music-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 8px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .control-btn.play-btn {
            background: #e11d48;
            width: 42px;
            height: 42px;
        }

        .control-btn.play-btn:hover {
            background: #be123c;
        }

        /* ========== TOP BAR ========== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        body.black-theme .top-bar {
            background: rgba(15, 23, 42, 0.95);
            border-bottom-color: #334155;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-toggle {
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .menu-toggle:hover {
            background: #f1f5f9;
        }

        body.black-theme .menu-toggle:hover {
            background: #334155;
        }

        .menu-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background: #1e293b;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        body.black-theme .menu-toggle span {
            background: #e2e8f0;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -6px);
        }

        .api-name {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #e11d48, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .top-bar-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .theme-toggle-btn,
        .logout-btn {
            background: none;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        body.black-theme .theme-toggle-btn,
        body.black-theme .logout-btn {
            border-color: #475569;
            color: #f1f5f9;
        }

        .theme-toggle-btn:hover,
        .logout-btn:hover {
            background: #e11d48;
            color: white;
            border-color: #e11d48;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            position: fixed;
            top: 64px;
            left: -280px;
            width: 280px;
            height: calc(100vh - 64px);
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
            transition: left 0.3s ease;
            z-index: 999;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-overlay {
            position: fixed;
            top: 64px;
            left: 0;
            width: 100%;
            height: calc(100vh - 64px);
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 998;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-nav {
            padding: 20px 0;
        }

        .sidebar-item {
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            font-size: 14px;
            font-weight: 500;
        }

        .sidebar-item:hover {
            background: #f8fafc;
            color: #e11d48;
        }

        .sidebar-item.active {
            background: #fef2f2;
            border-left-color: #e11d48;
            color: #e11d48;
        }

        .sidebar-category {
            padding: 20px 24px 8px;
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            margin-top: 80px;
            padding: 30px 24px;
            max-width: 1300px;
            margin-left: auto;
            margin-right: auto;
            min-height: calc(100vh - 100px);
        }

        /* ========== HOME ========== */
        .home-banner {
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }

        .home-banner img {
            max-width: 55%;
            border-radius: 32px;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .home-title {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #e11d48, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .home-version {
            display: inline-block;
            background: #e11d48;
            color: white;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 25px 35px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.05);
            min-width: 180px;
            transition: all 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 48px;
            font-weight: 800;
            color: #e11d48;
        }

        .stat-label {
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
            margin-top: 8px;
        }

        body.black-theme .stat-label {
            color: #94a3b8;
        }

        /* ========== STATUS & ENDPOINTS ========== */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 30px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .status-card:hover {
            transform: translateY(-3px);
            border-color: #e11d48;
        }

        .endpoints-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .endpoint-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .endpoint-card:hover {
            transform: translateY(-3px);
            border-color: #e11d48;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .endpoint-info {
            flex: 1;
        }

        .endpoint-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .endpoint-desc {
            font-size: 12px;
            color: #64748b;
        }

        .endpoint-btn {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            margin-left: 15px;
        }

        .endpoint-btn:hover {
            background: linear-gradient(135deg, #e11d48, #be123c);
            transform: scale(1.02);
        }

        body.black-theme .endpoint-btn {
            background: linear-gradient(135deg, #334155, #1e293b);
        }

        /* ========== SEARCH ========== */
        .search-box {
            margin-bottom: 32px;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            background: white;
        }

        .search-input:focus {
            outline: none;
            border-color: #e11d48;
            box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.1);
        }

        .category-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
        }

        /* ========== MODAL ========== */
        .modal-content {
            border: none;
            border-radius: 24px;
            overflow: hidden;
        }

        .api-endpoint-box {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 13px;
            color: #e11d48;
            word-break: break-all;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .param-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 12px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .param-input:focus {
            outline: none;
            border-color: #e11d48;
            box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.1);
        }

        .response-box {
            background: #1e293b;
            padding: 16px;
            border-radius: 14px;
            font-family: monospace;
            font-size: 12px;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #e11d48, #be123c);
        }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #e2e8f0;
            margin-top: 50px;
            font-size: 13px;
            color: #94a3b8;
        }

        /* ========== AUTH MODAL ========== */
        .auth-card {
            max-width: 440px;
            margin: auto;
            background: white;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
        }

        body.black-theme .auth-card {
            background: #1e293b;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .auth-header img {
            width: 90px;
            border-radius: 30px;
            margin-bottom: 15px;
        }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .home-title {
                font-size: 36px;
            }
            .stat-card {
                padding: 15px 20px;
                min-width: 140px;
            }
            .stat-number {
                font-size: 32px;
            }
            .music-player {
                width: 280px;
            }
            .endpoints-grid {
                grid-template-columns: 1fr;
            }
            .main-content {
                padding: 20px 16px;
            }
            .top-bar {
                padding: 0 16px;
            }
            .api-name {
                font-size: 18px;
            }
        }
    </style>
</head>
<body class="white-theme">
    <!-- LOADING SCREEN -->
    <div id="loadingScreen">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p style="margin-top: 16px; font-weight: 500;">Cargando ALYA...</p>
    </div>

    <!-- REPRODUCTOR DE MÚSICA FLOTANTE -->
    <div class="music-player" id="musicPlayer">
        <div class="music-header">
            <span class="music-title">🎵 ACENTO · QUINTO REAL</span>
            <button class="music-toggle-min" id="toggleMinimize">−</button>
        </div>
        <div class="music-info">
            <div class="song-name" id="songName">Una vaina loca</div>
            <div class="artist-name" id="artistName">Acento Quinto Real</div>
        </div>
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
        <div class="music-controls">
            <button class="control-btn" id="prevBtn"><i class="fas fa-backward"></i></button>
            <button class="control-btn play-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
            <button class="control-btn" id="nextBtn"><i class="fas fa-forward"></i></button>
        </div>
    </div>
    <audio id="audioPlayer"></audio>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-left">
            <button class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="api-name" id="apiName">ALYA</div>
        </div>
        <div class="top-bar-right">
            <button class="theme-toggle-btn" id="themeToggleBtn"><i class="fas fa-moon"></i> Oscuro</button>
            <button class="logout-btn" id="logoutBtn" style="display: none;"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-nav">
            <div class="sidebar-item active" data-page="home"><i class="fas fa-home me-2"></i> Home</div>
            <div class="sidebar-item" data-page="status"><i class="fas fa-chart-line me-2"></i> Status</div>
            <div class="sidebar-category"><i class="fas fa-tag me-2"></i> Categorías</div>
            <div id="categoriesNav"></div>
            <div class="sidebar-item" data-page="all"><i class="fas fa-cubes me-2"></i> Todos los endpoints</div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent"></div>

    <!-- FOOTER -->
    <div class="footer">
        <p id="footerText">✨ ALYA · API Profesional 🍚</p>
    </div>

    <!-- MODAL PARA ENDPOINTS -->
    <div class="modal fade" id="apiModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title" id="modalTitle"></h5>
                        <p class="modal-desc" id="modalDesc"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="api-endpoint-box" id="endpointBox" style="display: none;"></div>
                    <div id="paramsContainer"></div>
                    <div id="loadingContainer" style="display: none; text-align: center; padding: 40px;">
                        <div class="spinner-border" role="status"></div>
                    </div>
                    <div id="responseContainer"></div>
                </div>
                <div class="modal-footer">
                    <button class="submit-btn" id="submitBtn" style="display: none;">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ==================== AUTENTICACIÓN ====================
        let currentUser = JSON.parse(localStorage.getItem('alya_user'));
        let usersDB = JSON.parse(localStorage.getItem('alya_users') || '[]');

        function saveUsers() { localStorage.setItem('alya_users', JSON.stringify(usersDB)); }
        function saveCurrentUser() { if(currentUser) localStorage.setItem('alya_user', JSON.stringify(currentUser)); else localStorage.removeItem('alya_user'); }

        function showAuthModal() {
            const modalHTML = `
                <div class="modal fade" id="authModal" tabindex="-1" data-bs-backdrop="static">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content auth-card" style="border: none;">
                            <div class="auth-header">
                                <img src="https://files.catbox.moe/osy7r9.jpg" alt="ALYA">
                                <h3 class="mt-3">Bienvenido a ALYA</h3>
                                <p class="text-muted">API Profesional</p>
                            </div>
                            <ul class="nav nav-tabs justify-content-center" id="authTab" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Iniciar sesión</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Registrarse</button>
                                </li>
                            </ul>
                            <div class="tab-content mt-3">
                                <div class="tab-pane fade show active" id="login" role="tabpanel">
                                    <input type="text" id="loginUser" class="form-control mb-2" placeholder="Usuario">
                                    <input type="password" id="loginPass" class="form-control mb-2" placeholder="Contraseña">
                                    <button id="doLoginBtn" class="btn btn-danger w-100 mt-2">Entrar</button>
                                </div>
                                <div class="tab-pane fade" id="register" role="tabpanel">
                                    <input type="text" id="regUser" class="form-control mb-2" placeholder="Nuevo usuario">
                                    <input type="password" id="regPass" class="form-control mb-2" placeholder="Contraseña">
                                    <button id="doRegBtn" class="btn btn-outline-danger w-100">Crear cuenta</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            const modalEl = document.getElementById('authModal');
            const authModal = new bootstrap.Modal(modalEl, { backdrop: 'static', keyboard: false });
            authModal.show();

            document.getElementById('doLoginBtn').onclick = () => {
                const user = document.getElementById('loginUser').value.trim();
                const pass = document.getElementById('loginPass').value.trim();
                const found = usersDB.find(u => u.username === user && u.password === pass);
                if(found) {
                    currentUser = found;
                    saveCurrentUser();
                    authModal.hide();
                    location.reload();
                } else {
                    alert('❌ Usuario o contraseña incorrectos');
                }
            };

            document.getElementById('doRegBtn').onclick = () => {
                const user = document.getElementById('regUser').value.trim();
                const pass = document.getElementById('regPass').value.trim();
                if(!user || !pass) return alert('Completa todos los campos');
                if(usersDB.find(u => u.username === user)) return alert('El usuario ya existe');
                const newUser = { username: user, password: pass, createdAt: new Date().toISOString() };
                usersDB.push(newUser);
                saveUsers();
                currentUser = newUser;
                saveCurrentUser();
                authModal.hide();
                location.reload();
            };

            modalEl.addEventListener('hidden.bs.modal', () => {
                if(!currentUser) showAuthModal();
            });
        }

        if(!currentUser) {
            showAuthModal();
        }

        document.getElementById('logoutBtn').onclick = () => {
            currentUser = null;
            saveCurrentUser();
            location.reload();
        };
        if(currentUser) document.getElementById('logoutBtn').style.display = 'flex';

        // ==================== TEMA OSCURO / CLARO ====================
        let isDark = localStorage.getItem('alya_theme') === 'dark';
        function applyTheme() {
            if(isDark) {
                document.body.classList.remove('white-theme');
                document.body.classList.add('black-theme');
                document.getElementById('themeToggleBtn').innerHTML = '<i class="fas fa-sun"></i> Claro';
            } else {
                document.body.classList.remove('black-theme');
                document.body.classList.add('white-theme');
                document.getElementById('themeToggleBtn').innerHTML = '<i class="fas fa-moon"></i> Oscuro';
            }
        }
        applyTheme();
        document.getElementById('themeToggleBtn').onclick = () => {
            isDark = !isDark;
            localStorage.setItem('alya_theme', isDark ? 'dark' : 'light');
            applyTheme();
        };

        // ==================== REPRODUCTOR DE MÚSICA ====================
        // Ambas canciones usan el mismo enlace (Acento Quinto Real / Una vaina loca)
        const playlist = [
            { name: "Acento Quinto Real", artist: "Una vaina loca", url: "https://files.catbox.moe/g2zd2z.mp3" },
            { name: "Una vaina loca", artist: "Acento Quinto Real", url: "https://files.catbox.moe/65kqmi.mp3" }
        ];
        
        let currentSongIndex = 0;
        let isPlaying = false;
        let isMinimized = false;
        
        const audioEl = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const songNameEl = document.getElementById('songName');
        const artistNameEl = document.getElementById('artistName');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const toggleMinimizeBtn = document.getElementById('toggleMinimize');
        const musicPlayerDiv = document.getElementById('musicPlayer');

        function loadSong(index) {
            const song = playlist[index];
            songNameEl.textContent = song.name;
            artistNameEl.textContent = song.artist;
            audioEl.src = song.url;
            audioEl.load();
            if(isPlaying) {
                audioEl.play().catch(e => console.log('Error al reproducir:', e));
            }
            updatePlayIcon();
        }

        function updatePlayIcon() {
            const icon = playPauseBtn.querySelector('i');
            if(isPlaying) {
                icon.className = 'fas fa-pause';
            } else {
                icon.className = 'fas fa-play';
            }
        }

        function playPauseSong() {
            if(isPlaying) {
                audioEl.pause();
            } else {
                audioEl.play().catch(e => console.log('Error al reproducir:', e));
            }
            isPlaying = !isPlaying;
            updatePlayIcon();
        }

        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            loadSong(currentSongIndex);
            if(!isPlaying) {
                playPauseSong();
            }
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentSongIndex);
            if(!isPlaying) {
                playPauseSong();
            }
        }

        function updateProgress() {
            if(audioEl.duration && !isNaN(audioEl.duration)) {
                const percent = (audioEl.currentTime / audioEl.duration) * 100;
                progressBar.style.width = `${percent}%`;
                currentTimeEl.textContent = formatTime(audioEl.currentTime);
                durationEl.textContent = formatTime(audioEl.duration);
            }
        }

        function formatTime(seconds) {
            if(isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function setProgress(e) {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioEl.currentTime = percent * audioEl.duration;
        }

        function toggleMinimizePlayer() {
            isMinimized = !isMinimized;
            if(isMinimized) {
                musicPlayerDiv.classList.add('minimized');
                toggleMinimizeBtn.textContent = '+';
            } else {
                musicPlayerDiv.classList.remove('minimized');
                toggleMinimizeBtn.textContent = '−';
            }
        }

        playPauseBtn.addEventListener('click', playPauseSong);
        nextBtn.addEventListener('click', nextSong);
        prevBtn.addEventListener('click', prevSong);
        audioEl.addEventListener('timeupdate', updateProgress);
        audioEl.addEventListener('ended', nextSong);
        progressContainer.addEventListener('click', setProgress);
        toggleMinimizeBtn.addEventListener('click', toggleMinimizePlayer);
        
        // Cargar primera canción
        loadSong(0);

        // ==================== API Y DASHBOARD ====================
        let settings = {
            name: "ALYA",
            version: "v2.0 · Quinto Real",
            description: "API profesional con endpoints listos para integrar",
            header: {
                imageSrc: ["https://files.catbox.moe/osy7r9.jpg"],
                imageSize: { desktop: "50%" }
            },
            apiSettings: {
                creator: "Alya"
            },
            categories: [
                { 
                    name: "Usuarios", 
                    items: [
                        { name: "Perfil", path: "/api/user", desc: "Obtener perfil de usuario", innerDesc: "Devuelve datos del perfil del usuario autenticado" }
                    ] 
                },
                { 
                    name: "Contenido", 
                    items: [
                        { name: "Feed", path: "/api/feed", desc: "Feed dinámico de contenido", innerDesc: "Obtiene las últimas publicaciones" }
                    ] 
                },
                { 
                    name: "Música", 
                    items: [
                        { name: "Canción actual", path: "/api/song", desc: "Obtener información de la canción", innerDesc: "Devuelve los datos de la canción que suena actualmente" }
                    ] 
                }
            ]
        };

        async function loadSettings() {
            try {
                const response = await fetch('/src/settings.json');
                if(response.ok) {
                    settings = await response.json();
                }
            } catch(e) {
                console.log('Usando configuración por defecto');
            }
            
            document.title = settings.name || "ALYA";
            document.getElementById('apiName').innerHTML = settings.name || "ALYA";
            document.getElementById('footerText').innerHTML = `🍚 ${settings.name || 'ALYA'} · ${settings.apiSettings?.creator || 'Alya'} · Ac. Quinto Real`;
            
            const categoriesNav = document.getElementById('categoriesNav');
            if(settings.categories) {
                settings.categories.forEach(category => {
                    const item = document.createElement('div');
                    item.className = 'sidebar-item';
                    item.dataset.page = 'category';
                    item.dataset.category = category.name;
                    item.innerHTML = `<i class="fas fa-folder me-2"></i> ${category.name}`;
                    categoriesNav.appendChild(item);
                });
            }
        }

        function initUI() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            menuToggle.addEventListener('click', () => {
                menuToggle.classList.toggle('active');
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            });

            overlay.addEventListener('click', () => {
                menuToggle.classList.remove('active');
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });

            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.addEventListener('click', () => {
                    const page = item.dataset.page;
                    const category = item.dataset.category;
                    
                    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    
                    if(page === 'category') {
                        renderPage('category', category);
                    } else {
                        renderPage(page);
                    }
                    
                    menuToggle.classList.remove('active');
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                });
            });
        }

        function getTotalEndpoints() {
            let total = 0;
            if(settings.categories) {
                settings.categories.forEach(cat => {
                    total += cat.items.length;
                });
            }
            return total;
        }

        function renderPage(page, category = null) {
            const container = document.getElementById('mainContent');
            
            if(page === 'home') {
                const imageSrc = Array.isArray(settings.header.imageSrc) && settings.header.imageSrc.length > 0
                    ? settings.header.imageSrc[Math.floor(Math.random() * settings.header.imageSrc.length)]
                    : 'https://files.catbox.moe/osy7r9.jpg';
                
                container.innerHTML = `
                    <div class="home-banner">
                        <img src="${imageSrc}" alt="${settings.name}">
                        <h1 class="home-title">${settings.name}</h1>
                        <div class="home-version">${settings.version}</div>
                        <p class="text-secondary mb-4">${settings.description || 'API Documentation'}</p>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-number">${getTotalEndpoints()}</div>
                                <div class="stat-label">Endpoints disponibles</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${settings.categories?.length || 0}</div>
                                <div class="stat-label">Categorías</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number"><i class="fas fa-music"></i></div>
                                <div class="stat-label">Acento Quinto Real</div>
                            </div>
                        </div>
                        <p class="mt-3"><i class="fas fa-headphones text-danger"></i> Disfruta de "Una vaina loca" mientras exploras la API</p>
                    </div>
                `;
            } 
            else if(page === 'status') {
                container.innerHTML = `
                    <h2 class="category-title"><i class="fas fa-chart-line me-2"></i> Estado del sistema</h2>
                    <div class="status-grid">
                        <div class="status-card">
                            <div class="status-card-title">API Status</div>
                            <div class="status-card-value" style="color: #10b981;">🟢 Online</div>
                        </div>
                        <div class="status-card">
                            <div class="status-card-title">Versión</div>
                            <div class="status-card-value">${settings.version}</div>
                        </div>
                        <div class="status-card">
                            <div class="status-card-title">Música Activa</div>
                            <div class="status-card-value" style="color: #e11d48;">🎵 Una vaina loca</div>
                        </div>
                        <div class="status-card">
                            <div class="status-card-title">Artista</div>
                            <div class="status-card-value">Acento Quinto Real</div>
                        </div>
                    </div>
                `;
            }
            else if(page === 'category' && category) {
                const cat = settings.categories.find(c => c.name === category);
                if(!cat) return;
                
                container.innerHTML = `
                    <div class="search-box">
                        <input type="text" class="search-input" placeholder="🔍 Buscar endpoints..." id="searchInput">
                    </div>
                    <div class="category-section">
                        <h2 class="category-title"><i class="fas fa-folder-open me-2"></i> ${cat.name}</h2>
                        <div class="endpoints-grid" id="endpointsGrid">
                            ${cat.items.map(item => `
                                <div class="endpoint-card" data-name="${item.name.toLowerCase()}">
                                    <div class="endpoint-info">
                                        <div class="endpoint-name"><i class="fas fa-code me-2"></i> ${item.name}</div>
                                        <div class="endpoint-desc">${item.desc}</div>
                                    </div>
                                    <button class="endpoint-btn" data-path="${item.path}" data-name="${item.name}" data-desc="${item.desc}" data-inner="${item.innerDesc || ''}">
                                        GET <i class="fas fa-arrow-right ms-1"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                
                setupSearch();
                attachEndpointEvents();
            }
            else if(page === 'all') {
                container.innerHTML = `
                    <div class="search-box">
                        <input type="text" class="search-input" placeholder="🔍 Buscar endpoints..." id="searchInput">
                    </div>
                    <div id="allCategories"></div>
                `;
                
                const allCategories = document.getElementById('allCategories');
                if(settings.categories) {
                    settings.categories.forEach(category => {
                        allCategories.innerHTML += `
                            <div class="category-section" data-category="${category.name}">
                                <h2 class="category-title"><i class="fas fa-cube me-2"></i> ${category.name}</h2>
                                <div class="endpoints-grid">
                                    ${category.items.map(item => `
                                        <div class="endpoint-card" data-name="${item.name.toLowerCase()}">
                                            <div class="endpoint-info">
                                                <div class="endpoint-name"><i class="fas fa-code me-2"></i> ${item.name}</div>
                                                <div class="endpoint-desc">${item.desc}</div>
                                            </div>
                                            <button class="endpoint-btn" data-path="${item.path}" data-name="${item.name}" data-desc="${item.desc}" data-inner="${item.innerDesc || ''}">
                                                GET <i class="fas fa-arrow-right ms-1"></i>
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    });
                }
                
                setupSearch();
                attachEndpointEvents();
            }
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            if(!searchInput) return;
            
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const cards = document.querySelectorAll('.endpoint-card');
                const sections = document.querySelectorAll('.category-section');
                
                cards.forEach(card => {
                    const name = card.dataset.name;
                    const matches = name.includes(term);
                    card.style.display = matches ? '' : 'none';
                });
                
                sections.forEach(section => {
                    const visibleCards = section.querySelectorAll('.endpoint-card:not([style*="display: none"])');
                    section.style.display = visibleCards.length > 0 ? '' : 'none';
                });
            });
        }

        function attachEndpointEvents() {
            document.querySelectorAll('.endpoint-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const path = btn.dataset.path;
                    const name = btn.dataset.name;
                    const desc = btn.dataset.desc;
                    const innerDesc = btn.dataset.inner;
                    openModal(path, name, desc, innerDesc);
                });
            });
        }

        async function openModal(path, name, desc, innerDesc) {
            const modal = new bootstrap.Modal(document.getElementById('apiModal'));
            
            document.getElementById('modalTitle').textContent = name;
            document.getElementById('modalDesc').textContent = desc;
            document.getElementById('endpointBox').style.display = 'block';
            document.getElementById('endpointBox').innerHTML = `<code>${window.location.origin + path}</code>`;
            document.getElementById('paramsContainer').innerHTML = '';
            document.getElementById('responseContainer').innerHTML = '';
            document.getElementById('submitBtn').style.display = 'none';
            
            const urlParts = path.split('?');
            const params = new URLSearchParams(urlParts[1] || '');
            const hasParams = Array.from(params.keys()).length > 0;
            
            if(hasParams) {
                const paramsContainer = document.getElementById('paramsContainer');
                
                Array.from(params.keys()).forEach(param => {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'param-input';
                    input.placeholder = `Ingresa ${param}...`;
                    input.dataset.param = param;
                    paramsContainer.appendChild(input);
                });
                
                if(innerDesc) {
                    const descDiv = document.createElement('div');
                    descDiv.className = 'inner-desc text-muted small mt-2';
                    descDiv.innerHTML = `<i class="fas fa-info-circle me-1"></i> ${innerDesc}`;
                    paramsContainer.appendChild(descDiv);
                }
                
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.style.display = 'block';
                submitBtn.disabled = true;
                
                paramsContainer.querySelectorAll('.param-input').forEach(input => {
                    input.addEventListener('input', () => {
                        const allInputs = paramsContainer.querySelectorAll('.param-input');
                        const allFilled = Array.from(allInputs).every(inp => inp.value.trim() !== '');
                        submitBtn.disabled = !allFilled;
                    });
                });
                
                submitBtn.onclick = async () => {
                    const inputs = paramsContainer.querySelectorAll('.param-input');
                    const newParams = new URLSearchParams();
                    let isValid = true;
                    
                    inputs.forEach(input => {
                        if(!input.value.trim()) {
                            isValid = false;
                            input.classList.add('is-invalid');
                        } else {
                            input.classList.remove('is-invalid');
                            newParams.append(input.dataset.param, input.value.trim());
                        }
                    });
                    
                    if(!isValid) return;
                    
                    const fullUrl = `${window.location.origin}${urlParts[0]}?${newParams.toString()}`;
                    document.getElementById('loadingContainer').style.display = 'block';
                    
                    try {
                        const response = await fetch(fullUrl);
                        const contentType = response.headers.get('Content-Type');
                        
                        if(contentType && contentType.startsWith('image/')) {
                            const blob = await response.blob();
                            const imageUrl = URL.createObjectURL(blob);
                            const img = document.createElement('img');
                            img.src = imageUrl;
                            img.className = 'response-image w-100 mt-2 rounded';
                            document.getElementById('responseContainer').innerHTML = '';
                            document.getElementById('responseContainer').appendChild(img);
                        } else {
                            const data = await response.json();
                            document.getElementById('responseContainer').innerHTML = `<pre class="response-box">${JSON.stringify(data, null, 2)}</pre>`;
                        }
                    } catch(error) {
                        document.getElementById('responseContainer').innerHTML = `<pre class="response-box text-danger">Error: ${error.message}</pre>`;
                    }
                    
                    document.getElementById('loadingContainer').style.display = 'none';
                };
            } else {
                document.getElementById('loadingContainer').style.display = 'block';
                
                try {
                    const response = await fetch(window.location.origin + path);
                    const contentType = response.headers.get('Content-Type');
                    
                    if(contentType && contentType.startsWith('image/')) {
                        const blob = await response.blob();
                        const imageUrl = URL.createObjectURL(blob);
                        const img = document.createElement('img');
                        img.src = imageUrl;
                        img.className = 'response-image w-100 mt-2 rounded';
                        document.getElementById('responseContainer').appendChild(img);
                    } else {
                        const data = await response.json();
                        document.getElementById('responseContainer').innerHTML = `<pre class="response-box">${JSON.stringify(data, null, 2)}</pre>`;
                    }
                } catch(error) {
                    document.getElementById('responseContainer').innerHTML = `<pre class="response-box text-danger">Error: ${error.message}</pre>`;
                }
                
                document.getElementById('loadingContainer').style.display = 'none';
            }
            
            modal.show();
        }

        async function start() {
            await loadSettings();
            initUI();
            renderPage('home');
            
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.classList.add('fade-out');
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                document.body.classList.remove('no-scroll');
            }, 500);
        }
        
        start();
    </script>
</body>
</html>
